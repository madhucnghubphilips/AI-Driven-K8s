# Default values for ai-driven-k8s Helm chart.

namespace: security-scanning

aiAnalyzer:
  image:
    repository: ghcr.io/madhucnghubphilips/ai-driven-k8s/ai-analyzer
    tag: latest
    pullPolicy: Always
  replicas: 1
  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 1Gi
  service:
    port: 8080
    type: ClusterIP

sast:
  enabled: true
  image: returntocorp/semgrep:latest
  resources:
    requests:
      cpu: 500m
      memory: 512Mi
    limits:
      cpu: 2000m
      memory: 2Gi
  sourceCodePVC: source-code-pvc

dast:
  enabled: true
  image: ghcr.io/zaproxy/zaproxy:stable
  targetUrl: "http://target-service:8080"
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: 2000m
      memory: 4Gi

semgrepSecrets:
  appToken: ""
