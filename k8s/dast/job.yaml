apiVersion: v1
kind: ConfigMap
metadata:
  name: zap-config
  namespace: security-scanning
  labels:
    app.kubernetes.io/name: ai-driven-k8s
    app.kubernetes.io/component: dast
data:
  zap-baseline.conf: |
    # OWASP ZAP Baseline Scan Configuration
    rules.conf=disable 10096
  zap-full.conf: |
    # OWASP ZAP Full Scan Configuration
    replacer.full_list(0).description=Auth Header
    replacer.full_list(0).enabled=true
    replacer.full_list(0).matchtype=REQ_HEADER
    replacer.full_list(0).matchstr=Authorization
    replacer.full_list(0).regex=false
    replacer.full_list(0).replacement=******
---
apiVersion: batch/v1
kind: Job
metadata:
  name: dast-scan
  namespace: security-scanning
  labels:
    app.kubernetes.io/name: ai-driven-k8s
    app.kubernetes.io/component: dast
    scan-type: dast
spec:
  ttlSecondsAfterFinished: 3600
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ai-driven-k8s
        app.kubernetes.io/component: dast
    spec:
      serviceAccountName: security-scanner
      restartPolicy: Never
      initContainers:
        - name: wait-for-target
          image: curlimages/curl:latest
          command:
            - sh
            - -c
            - |
              TARGET_URL="${TARGET_URL:-http://target-service:8080}"
              echo "Waiting for target at $TARGET_URL..."
              until curl -sf "$TARGET_URL/health" > /dev/null 2>&1; do
                sleep 10
              done
              echo "Target is ready."
          env:
            - name: TARGET_URL
              valueFrom:
                configMapKeyRef:
                  name: dast-target-config
                  key: target-url
                  optional: true
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 64Mi
      containers:
        - name: zap
          image: ghcr.io/zaproxy/zaproxy:stable
          imagePullPolicy: Always
          command:
            - sh
            - -c
            - |
              TARGET_URL="${TARGET_URL:-http://target-service:8080}"
              zap-baseline.py \
                -t "$TARGET_URL" \
                -J /results/dast-results.json \
                -r /results/dast-report.html \
                -I || true
              curl -X POST http://ai-analyzer-service:8080/analyze/dast \
                -H "Content-Type: application/json" \
                -d @/results/dast-results.json
          env:
            - name: TARGET_URL
              valueFrom:
                configMapKeyRef:
                  name: dast-target-config
                  key: target-url
                  optional: true
          volumeMounts:
            - name: results
              mountPath: /results
            - name: zap-config
              mountPath: /zap/wrk
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: 2000m
              memory: 4Gi
      volumes:
        - name: results
          emptyDir: {}
        - name: zap-config
          configMap:
            name: zap-config
  backoffLimit: 2
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: dast-target-config
  namespace: security-scanning
  labels:
    app.kubernetes.io/name: ai-driven-k8s
    app.kubernetes.io/component: dast
data:
  target-url: "http://target-service:8080"
