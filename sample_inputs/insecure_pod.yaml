apiVersion: apps/v1
kind: Deployment
metadata:
  name: insecure-demo
  namespace: default
spec:
  selector:
    matchLabels:
      app: insecure-demo
  template:
    metadata:
      labels:
        app: insecure-demo
    spec:
      hostNetwork: true
      containers:
        - name: app
          image: nginx:latest
          securityContext:
            privileged: true
            capabilities:
              add:
                - SYS_ADMIN
          env:
            - name: DB_PASSWORD
              value: change-me
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: broad-admin
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-admin
subjects:
  - kind: Group
    name: system:authenticated
    apiGroup: rbac.authorization.k8s.io
